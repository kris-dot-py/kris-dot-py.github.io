<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Admin — Weniska & Kristen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a97e;--deep:#0e0904;--text:#fff}
body{font-family:'Jost',sans-serif;background:var(--deep);color:var(--text);min-height:100vh;padding:2rem 1rem}
h1{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold);font-weight:300;text-align:center;margin-bottom:0.3rem}
.sub{text-align:center;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:2rem}
.lock-screen{max-width:340px;margin:4rem auto;text-align:center}
.lock-screen input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(200,169,126,0.3);border-radius:4px;padding:0.8rem 1rem;color:#fff;font-family:'Jost',sans-serif;font-size:0.9rem;outline:none;margin-bottom:1rem;text-align:center;letter-spacing:0.2em}
.lock-btn{background:var(--gold);color:#0e0904;border:none;padding:0.8rem 2.5rem;font-family:'Jost',sans-serif;font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;border-radius:4px}
.lock-btn:hover{opacity:0.85}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;max-width:700px;margin:0 auto 2rem}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(200,169,126,0.2);border-radius:6px;padding:1.2rem;text-align:center}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--gold);font-weight:300}
.stat-label{font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:0.2rem}
table{width:100%;max-width:900px;margin:0 auto;border-collapse:collapse;font-size:0.8rem}
th{background:rgba(200,169,126,0.15);color:var(--gold);font-weight:400;letter-spacing:0.15em;text-transform:uppercase;font-size:0.65rem;padding:0.8rem 0.6rem;text-align:left}
td{padding:0.7rem 0.6rem;border-bottom:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.75);vertical-align:top}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:50px;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase}
.badge-yes{background:rgba(100,200,100,0.15);color:#8edc8e}
.badge-no{background:rgba(200,80,80,0.15);color:#e88e8e}
.empty{text-align:center;color:rgba(255,255,255,0.25);padding:3rem;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.2rem}
.export-btn{display:block;margin:2rem auto 0;background:none;border:1px solid rgba(200,169,126,0.4);color:var(--gold);padding:0.6rem 1.8rem;font-family:'Jost',sans-serif;font-size:0.68rem;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;border-radius:50px}
.export-btn:hover{background:rgba(200,169,126,0.1)}
#admin-panel{display:none}
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <h1>Admin Access</h1>
  <p class="sub">Weniska &amp; Kristen — RSVP Tracker</p>
  <input type="password" id="pwd-input" placeholder="Enter Password" onkeydown="if(event.key==='Enter')unlock()">
  <br>
  <button class="lock-btn" onclick="unlock()">Enter</button>
  <p id="pwd-error" style="color:#e88e8e;font-size:0.75rem;margin-top:0.8rem;display:none">Incorrect password</p>
</div>

<div id="admin-panel">
  <h1>RSVP Dashboard</h1>
  <p class="sub">Weniska &amp; Kristen &bull; August 1, 2026</p>

  <div class="stats" id="stats-row"></div>

  <table id="rsvp-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Party</th>
        <th>Additional Guests</th>
        <th>Dietary</th>
        <th>Song Request</th>
        <th>Submitted</th>
      </tr>
    </thead>
    <tbody id="rsvp-tbody"></tbody>
  </table>

  <button class="export-btn" onclick="exportCSV()">Export as CSV</button>
</div>

<script>
const ADMIN_PASS = "WeniskaKristen2026";

function unlock(){
  const val = document.getElementById('pwd-input').value;
  if(val === ADMIN_PASS){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    loadData();
  } else {
    document.getElementById('pwd-error').style.display='block';
  }
}

function loadData(){
  let responses = [];
  try{ responses = JSON.parse(sessionStorage.getItem('rsvp_responses')||'[]'); }catch(e){}

  const total = responses.length;
  const attending = responses.filter(r=>r.attending==='yes').length;
  const notAttending = responses.filter(r=>r.attending==='no').length;
  const totalGuests = responses.filter(r=>r.attending==='yes').reduce((s,r)=>s+(parseInt(r.partySize)||1),0);

  const statsRow = document.getElementById('stats-row');
  statsRow.innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">RSVPs Received</div></div>
    <div class="stat-card"><div class="stat-num">${attending}</div><div class="stat-label">Attending</div></div>
    <div class="stat-card"><div class="stat-num">${notAttending}</div><div class="stat-label">Not Attending</div></div>
    <div class="stat-card"><div class="stat-num">${totalGuests}</div><div class="stat-label">Total Guests</div></div>
  `;

  const tbody = document.getElementById('rsvp-tbody');
  if(responses.length === 0){
    tbody.innerHTML = `<tr><td colspan="9" class="empty">No RSVPs yet — check back soon 🤍</td></tr>`;
    return;
  }
  tbody.innerHTML = responses.map((r,i)=>`
    <tr>
      <td style="color:rgba(255,255,255,0.3)">${i+1}</td>
      <td style="color:#fff;font-weight:400">${r.name}</td>
      <td>${r.phone||'—'}</td>
      <td><span class="badge badge-${r.attending==='yes'?'yes':'no'}">${r.attending==='yes'?'Attending':'Declined'}</span></td>
      <td>${r.attending==='yes'?(r.partySize||1):'—'}</td>
      <td>${r.extras&&r.extras.length?r.extras.join(', '):'—'}</td>
      <td>${r.dietary||'None'}</td>
      <td>${r.song||'—'}</td>
      <td style="font-size:0.7rem;color:rgba(255,255,255,0.35)">${r.timestamp?new Date(r.timestamp).toLocaleDateString():'—'}</td>
    </tr>
  `).join('');
}

function exportCSV(){
  let responses=[];
  try{responses=JSON.parse(sessionStorage.getItem('rsvp_responses')||'[]');}catch(e){}
  if(!responses.length){alert('No data to export yet.');return;}
  const headers=['Name','Phone','Status','Party Size','Additional Guests','Dietary','Song Request','Submitted'];
  const rows=responses.map(r=>[
    `"${r.name}"`,`"${r.phone||''}"`,`"${r.attending}"`,
    `"${r.partySize||1}"`,`"${(r.extras||[]).join(', ')}"`,
    `"${r.dietary||''}"`,`"${r.song||''}"`,`"${r.timestamp||''}"`
  ].join(','));
  const csv=headers.join(',')+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='rsvp-weniska-kristen.csv';
  a.click();
}
</script>
</body>
</html>
